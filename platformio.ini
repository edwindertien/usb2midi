; ============================================================
;  USB2MIDI — PlatformIO + earlphilhower Arduino-Pico
;  Board : Waveshare RP2350-USB-A
; ============================================================

[platformio]
default_envs = debug

[common]
platform  = https://github.com/maxgerhardt/platform-raspberrypi.git
board     = rpipico2
framework = arduino

board_build.core  = earlephilhower
board_build.f_cpu = 120000000L

board_build.arduino.earlephilhower.usb_stack  = tinyusb
board_build.filesystem_size                   = 0.5m   ; 512KB for LittleFS

build_flags =
    -D USE_TINYUSB
    -D PIN_USB_HOST_DP=12
    -I lib/pio_usb

lib_deps =
    adafruit/Adafruit TinyUSB Library @ 3.4.4
    bblanchon/ArduinoJson @ ^7.0.0

lib_extra_dirs = lib

monitor_speed   = 115200
monitor_filters = direct


[env:debug]
extends = common
build_flags =
    ${common.build_flags}
    -D BUILD_DEBUG=1
board_build.arduino.earlephilhower.usb_type = cdc
monitor_port = /dev/ttyACM0


[env:midi]
extends = common
build_flags =
    ${common.build_flags}
    -D BUILD_MIDI=1
board_build.arduino.earlephilhower.usb_type = midi
lib_deps =
    ${common.lib_deps}
    fortyseveneffects/MIDI Library @ ^5.0.2